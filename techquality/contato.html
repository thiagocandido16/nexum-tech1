<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contato</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU CERTO NO TOPO -->
<header class="header-top">
  <h1 class="logo">Nexum Tech</h1>

  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="sobre.html">Sobre</a>
    <a href="servicos.html">Serviços</a>
    <a href="contato.html">Contato</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<!-- CONTEÚDO -->
<section class="contato-bg">

  <div class="overlay-contato">

    <div class="contato-container">

      <!-- LADO ESQUERDO -->
      <div class="contato-info">
        <h2>Fale Conosco</h2>
        <p>Entre em contato para saber mais sobre nossas soluções tecnológicas.</p>
      </div>

      <!-- FORMULÁRIO -->
      <form id="formulario" class="contato-form">
        <input type="text" id="nome" placeholder="Nome">
        <input type="email" id="email" placeholder="Email">
        <textarea id="mensagem" placeholder="Mensagem"></textarea>

        <button type="submit">Enviar</button>
        <p id="msg"></p>
      </form>

    </div>

  </div>

</section>

<script src="script.js"></script>

</body>
